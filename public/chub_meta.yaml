creator_notes: "
<div class=\"sct-section\">
  <h3>📋 Game Overview</h3>
  <p>You are the Founder of a young frontier town on the edge of the Crossroads - a realm between realms, where the roads of countless worlds meet. Beneath your town square sits a Wishing Well, tapping the deep current that runs between realities. That current carries wishes. Anyone, in any world, who truly and sincerely longs for a new life may find their wish heard - and their application for residency delivered to your desk.</p>
  <p>No one arrives here who does not want to be here, and the road home is always open. Your task is simpler and warmer than saving the world: review applications, welcome newcomers, raise buildings, assign roles, and help a town full of people from every walk of every world build their second chance.</p>
  <p>Each playthrough is unique, with characters and neighboring communities procedurally loaded from Chub's extensive library, ensuring no two towns are alike.</p>
  <p><em>A cozy rework of Lord Raven's Post-Apocalypse Rehabilitation Center, by way of The Spire, made with his blessing.</em></p>
</div>

<div class=\"sct-section\">
  <h3>✨ Key Features</h3>
  <ul class=\"sct-feature-list\">
    <li><strong>Volunteers Only:</strong> Every resident chose this - some knowingly, some through a wish they barely dared to speak. Approve or decline applications, or pen direct invitations to specific people across the worlds.</li>
    <li><strong>Generative Content:</strong> Leverages Chub's generative endpoints to create character art, voice lines, and dynamic story content.</li>
    <li><strong>Dynamic Character System:</strong> Characters are loaded from Chub's library, creating unique residents and visiting envoys for every playthrough.</li>
    <li><strong>Interactive Skits:</strong> Visual novel-style scenes where your choices shape relationships, town stats, and story progression.</li>
    <li><strong>Town Management:</strong> Raise practical or frivolous buildings, manage six interconnected town stats, and balance competing needs.</li>
    <li><strong>Good Neighbors:</strong> Build relationships with the communities and guilds of the Crossroads, trade resources, and find work placements for your residents.</li>
    <li><strong>Content Filters:</strong> Extensive content management tools let you tailor the experience to your preferences.</li>
    <li><strong>Save System:</strong> Full save/load functionality to preserve your progress or experiment with different choices.</li>
  </ul>
</div>

<div class=\"sct-section\">
  <h3>📊 Town Stats</h3>
  <p>Your town's wellbeing is measured across six interconnected statistics. Every decision you make affects these values:</p>
  <div style=\"margin-top: 10px;\">
    <span class=\"sct-stat\">⚙️ Systems</span> - Roads, wards, and workings that keep the town running<br>
    <span class=\"sct-stat\">🛏️ Comfort</span> - How pleasant it feels to call this place home<br>
    <span class=\"sct-stat\">🍽️ Provision</span> - Food, water, and the town stores<br>
    <span class=\"sct-stat\">🛡️ Security</span> - The watch, the wards, and peace of mind on the frontier<br>
    <span class=\"sct-stat\">💖 Harmony</span> - Neighborliness, morale, and community spirit<br>
    <span class=\"sct-stat\">💰 Wealth</span> - The town coffers<br>
  </div>
</div>

<div class=\"sct-section\">
  <h3>🏗️ Core Buildings</h3>
  <p>Build and expand your town with specialized buildings. Most serve a unique function and can be assigned a resident to manage them.</p>

  <div class=\"sct-module\">
    <h4>Arrivals Hall</h4>
    <p><strong>Role:</strong> Greeter</p>
    <p>The heart of the town's welcome. Hopeful applicants whose wishes were heard step through here into the Crossroads - and take their first bewildered, hopeful steps as residents.</p>
  </div>

  <div class=\"sct-module\">
    <h4>Waystation</h4>
    <p><strong>Role:</strong> Herald</p>
    <p>The town's practical link to the wider Crossroads. Envoys arrive and depart here, trade is arranged, and residents head out to work placements in neighboring communities.</p>
  </div>

  <div class=\"sct-module\">
    <h4>Wishing Well</h4>
    <p><strong>Role:</strong> Wellkeeper</p>
    <p>Where the town taps the current that runs between worlds. Tend the waters and the workings that keep wishes flowing to your door.</p>
  </div>

  <div class=\"sct-module\">
    <h4>Cottages</h4>
    <p><strong>Role:</strong> Resident | <strong>Cost:</strong> <span class=\"sct-stat\">Provision 1</span></p>
    <p>Personal homes. Build multiple cottages to house your growing population. Visit residents for intimate, personal interactions.</p>
  </div>

  <div class=\"sct-module\">
    <h4>Town Square</h4>
    <p><strong>Role:</strong> Steward | <strong>Cost:</strong> <span class=\"sct-stat\">Provision 1</span></p>
    <p>A communal gathering space where residents eat, socialize, and build relationships. The social heart of your town.</p>
  </div>

  <div class=\"sct-module\">
    <h4>Apothecary</h4>
    <p><strong>Role:</strong> Healer | <strong>Cost:</strong> <span class=\"sct-stat\">Provision 1</span> <span class=\"sct-stat\">Comfort 1</span></p>
    <p>Healing hall for treating injuries and ailments. Essential for maintaining residents' health and well-being.</p>
  </div>

  <div class=\"sct-module\">
    <h4>Training Yard</h4>
    <p><strong>Role:</strong> Coach | <strong>Cost:</strong> <span class=\"sct-stat\">Comfort 1</span> <span class=\"sct-stat\">Wealth 1</span></p>
    <p>Open grounds for exercise and friendly contests. Keeps residents fit and spirits high.</p>
  </div>

  <div class=\"sct-module\">
    <h4>Tavern</h4>
    <p><strong>Role:</strong> Host | <strong>Cost:</strong> <span class=\"sct-stat\">Comfort 2</span> <span class=\"sct-stat\">Wealth 1</span></p>
    <p>Warm hearth, good drink, and better company. <em>Requires at least 3 residents in the town.</em></p>
  </div>

  <div class=\"sct-module\">
    <h4>Watch Post</h4>
    <p><strong>Role:</strong> Watch Captain | <strong>Cost:</strong> <span class=\"sct-stat\">Systems 1</span> <span class=\"sct-stat\">Wealth 1</span></p>
    <p>The frontier is gentle to those who respect it, but wilderness is still wilderness. Manages the town's wards, watch rotations, and defenses. <em>Requires contact with at least 3 neighboring communities.</em></p>
  </div>

  <div class=\"sct-module\">
    <h4>Festival Grounds</h4>
    <p><strong>Role:</strong> Organizer | <strong>Cost:</strong> <span class=\"sct-stat\">Harmony 2</span> <span class=\"sct-stat\">Systems 2</span></p>
    <p>Fairs, feasts, and seasonal celebrations that bring the whole town - and sometimes the whole Crossroads - together. <em>Requires at least 5 residents.</em></p>
  </div>

  <div class=\"sct-module\">
    <h4>Invitation Desk</h4>
    <p><strong>Role:</strong> Postmaster | <strong>Cost:</strong> <span class=\"sct-stat\">Systems 2</span> <span class=\"sct-stat\">Wealth 2</span></p>
    <p>Pen invitations to specific people across the worlds. The calling only lands if the heart it reaches answers - no one is ever brought here against their will. <em>Requires Systems stat of 5+.</em></p>
  </div>

  <div class=\"sct-module\">
    <h4>Community Halls</h4>
    <p><strong>Role:</strong> Assorted | <strong>Cost:</strong> <span class=\"sct-stat\">Wealth 3</span></p>
    <p>Every neighboring community offers a distinct, generated building and role, unique to that community. <em>Requires high reputation with the associated community.</em></p>
  </div>
  <div class=\"sct-module\">
    <h4>Founder's Choice</h4>
    <p><strong>Role:</strong> Founder's Choice</p>
    <p>Every game allows you to define a custom building and role of your choice; name the building and role and allow the game to generate content accordingly.</p>
  </div>
</div>

<div class=\"sct-section\">
  <h3>🎮 How to Play</h3>
  <ol>
    <li><strong>Configure settings:</strong> Define your Founder, the town's spirit steward, custom starter building, and content preferences.</li>
    <li><strong>Welcome residents:</strong> Review applications at the Arrivals Hall - approve, decline, or pen direct invitations.</li>
    <li><strong>Raise buildings:</strong> Construct homes and community buildings to house and employ your residents.</li>
    <li><strong>Assign roles:</strong> Give residents duties managing different buildings.</li>
    <li><strong>Befriend the neighbors:</strong> Work with nearby communities to find trade and employment opportunities.</li>
    <li><strong>Navigate skits:</strong> Make freeform choices in interactive scenes that shape relationships and outcomes.</li>
  </ol>
</div>
<style>.sct-section{background:linear-gradient(135deg,rgba(124,179,66,0.12) 0%,rgba(216,151,60,0.08) 100%);border-left:4px solid rgba(124,179,66,0.6);padding:15px;margin:15px 0;border-radius:6px;backdrop-filter:blur(10px)}.sct-section h3{margin-top:0;color:#aed581;font-size:1.3em;text-shadow:0 0 10px rgba(124,179,66,0.3)}.sct-module{background:linear-gradient(135deg,rgba(124,179,66,0.08) 0%,rgba(216,151,60,0.05) 100%);border:1px solid rgba(124,179,66,0.3);padding:12px;margin:10px 0;border-radius:6px;backdrop-filter:blur(5px)}.sct-module h4{color:#ffb74d;margin:0 0 8px 0;font-size:1.1em;text-shadow:0 0 8px rgba(216,151,60,0.3)}.sct-module p{margin:5px 0;opacity:0.9}.sct-stat{display:inline-block;background:linear-gradient(135deg,rgba(124,179,66,0.7) 0%,rgba(216,151,60,0.7) 100%);color:#fff;padding:3px 8px;border-radius:4px;font-size:0.85em;margin:2px;box-shadow:0 0 8px rgba(124,179,66,0.4)}.sct-feature-list{list-style:none;padding-left:0}.sct-feature-list li{padding:8px 0;padding-left:25px;position:relative;opacity:0.95}.sct-feature-list li:before{content:'🌱';position:absolute;left:0;font-size:1.2em;filter:drop-shadow(0 0 3px rgba(124,179,66,0.6))}.sct-link{color:#aed581;text-decoration:none;font-weight:bold;text-shadow:0 0 5px rgba(124,179,66,0.3)}.sct-link:hover{text-decoration:underline;color:#ffb74d}</style>
"

# The schema of any user-supplied config.
config_schema:
  type: object
  properties:
    beta_mode:
      title: Beta Mode
      description: Enable experimental beta features.
      type: string
      default: "False"
      enum: ["True", "False"]

# The schema of the state that you store.
state_schema:
  init:
    type: object
    properties:
      grid:
        type: string
  message:
    type: object
    properties:
      angry:
        type: boolean
        default: true
  chat:
    type: object
    properties:
      visited:
        type: array
        items:
          type: integer

# github_path points at THIS repo; extension_id is intentionally omitted
# so the deploy workflow mints a brand-new stage on first push.

github_path: 'https://github.com/Hawkerra/Second-Chance-Town'
