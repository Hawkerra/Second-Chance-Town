creator_notes: "
<div class=\"parc-section\">
  <h3>📋 Game Overview</h3>
  <p>You are the Magus of the Spire - a lone wizard's tower rising from a snarl of hostile jungle and ancient ruins, seated atop a great leyline nexus. Summoned here yourself by accident, you have inherited the tower, its title, and its strange apparatus, which draws living people from other realities down the leyline's one-way current. Manage resources, build rooms, assign roles, and navigate the social dynamics of residents plucked from countless different worlds.</p>
  <p>Each playthrough is unique, with characters and factions procedurally loaded from Chub's extensive library, ensuring no two games are alike.</p>
  <p><em>A fantasy rework of Lord Raven's Post-Apocalypse Rehabilitation Center, made with his blessing.</em></p>
</div>

<div class=\"parc-section\">
  <h3>✨ Key Features</h3>
  <ul class=\"parc-feature-list\">
    <li><strong>Generative Content:</strong> Leverages Chub's generative endpoints to create character art, voice lines, and dynamic story content.</li>
    <li><strong>Dynamic Character System:</strong> Characters are loaded from Chub's library, creating unique residents and faction envoys for every playthrough.</li>
    <li><strong>Interactive Skits:</strong> Visual novel-style scenes where your choices impact relationships, tower stats, and story progression.</li>
    <li><strong>Tower Management:</strong> Build critical or frivolous rooms, manage six critical tower stats, and balance competing needs.</li>
    <li><strong>Faction Diplomacy:</strong> Navigate relationships with external factions, trade resources, and find employment for your residents.</li>
    <li><strong>Content Filters:</strong> Extensive content management tools let you tailor the experience to your preferences.</li>
    <li><strong>Save System:</strong> Full save/load functionality to preserve your progress or experiment with different choices.</li>
  </ul>
</div>

<div class=\"parc-section\">
  <h3>📊 Tower Stats</h3>
  <p>Your tower's performance is measured across six interconnected statistics. Every decision you make affects these values:</p>
  <div style=\"margin-top: 10px;\">
    <span class=\"parc-stat\">⚙️ Systems</span> - Structural soundness and enchantment upkeep<br>
    <span class=\"parc-stat\">🛏️ Comfort</span> - Living conditions and livability<br>
    <span class=\"parc-stat\">🍽️ Provision</span> - Food, water, and essential supplies<br>
    <span class=\"parc-stat\">🛡️ Security</span> - Wards, watchfulness, and defense<br>
    <span class=\"parc-stat\">💖 Harmony</span> - Social cohesion and morale<br>
    <span class=\"parc-stat\">💰 Wealth</span> - Financial resources<br>
  </div>
</div>

<div class=\"parc-section\">
  <h3>🏗️ Core Rooms</h3>
  <p>Build and expand your tower with specialized rooms. Most rooms serve a unique function and can be assigned a resident to manage them.</p>

  <div class=\"parc-module\">
    <h4>Summoning Sanctum</h4>
    <p><strong>Role:</strong> Apprentice</p>
    <p>The heart of the tower. Here you complete summonings, drawing living people out of the leyline current and into this world - and here they take their first bewildered steps.</p>
  </div>

  <div class=\"parc-module\">
    <h4>Translocation Circle</h4>
    <p><strong>Role:</strong> Herald</p>
    <p>The tower's only practical link to the outside world. Approved envoys arrive and depart here, trade is arranged, and residents are sent out to work placements beyond the jungle.</p>
  </div>

  <div class=\"parc-module\">
    <h4>Leyline Font</h4>
    <p><strong>Role:</strong> Artificer</p>
    <p>Where the tower taps the leyline nexus beneath it. Tend the enchantments and flows of magic that keep the Spire standing.</p>
  </div>

  <div class=\"parc-module\">
    <h4>Chambers</h4>
    <p><strong>Role:</strong> Resident | <strong>Cost:</strong> <span class=\"parc-stat\">Provision 1</span></p>
    <p>Personal living spaces. Build multiple chambers to house your growing population. Visit residents for intimate, personal interactions.</p>
  </div>

  <div class=\"parc-module\">
    <h4>Great Hall</h4>
    <p><strong>Role:</strong> Steward | <strong>Cost:</strong> <span class=\"parc-stat\">Provision 1</span></p>
    <p>A communal gathering space where residents eat, socialize, and build relationships. The social heart of your tower.</p>
  </div>

  <div class=\"parc-module\">
    <h4>Apothecary</h4>
    <p><strong>Role:</strong> Healer | <strong>Cost:</strong> <span class=\"parc-stat\">Provision 1</span> <span class=\"parc-stat\">Comfort 1</span></p>
    <p>Healing hall for treating injuries and ailments. Essential for maintaining residents' health and well-being.</p>
  </div>

  <div class=\"parc-module\">
    <h4>Sparring Hall</h4>
    <p><strong>Role:</strong> Drillmaster | <strong>Cost:</strong> <span class=\"parc-stat\">Comfort 1</span> <span class=\"parc-stat\">Wealth 1</span></p>
    <p>Training hall for physical conditioning. Keeps residents fit and morale high through exercise and contests.</p>
  </div>

  <div class=\"parc-module\">
    <h4>Parlor</h4>
    <p><strong>Role:</strong> Host | <strong>Cost:</strong> <span class=\"parc-stat\">Comfort 2</span> <span class=\"parc-stat\">Wealth 1</span></p>
    <p>Recreation room with drink and diversions. <em>Requires at least 3 residents in the tower.</em></p>
  </div>

  <div class=\"parc-module\">
    <h4>Armory</h4>
    <p><strong>Role:</strong> Warden | <strong>Cost:</strong> <span class=\"parc-stat\">Systems 1</span> <span class=\"parc-stat\">Wealth 1</span></p>
    <p>Defense hub managing weapons, armor, and the Spire's protective wards. <em>Requires contact with at least 3 factions.</em></p>
  </div>

  <div class=\"parc-module\">
    <h4>Homeward Gate</h4>
    <p><strong>Role:</strong> Gatekeeper | <strong>Cost:</strong> <span class=\"parc-stat\">Harmony 2</span> <span class=\"parc-stat\">Systems 2</span></p>
    <p>A two-way portal that sends residents home under a recall bond - and works for everyone but the Magus. Manage who stays and who returns home. <em>Requires at least 5 residents.</em></p>
  </div>

  <div class=\"parc-module\">
    <h4>Arcane Focus</h4>
    <p><strong>Role:</strong> Attuner | <strong>Cost:</strong> <span class=\"parc-stat\">Systems 2</span> <span class=\"parc-stat\">Wealth 2</span></p>
    <p>Experimental apparatus for studying and shaping the summoning phenomenon. Attune the nature of who and what the leyline delivers. <em>Requires Systems stat of 5+.</em></p>
  </div>

  <div class=\"parc-module\">
    <h4>Faction Rooms</h4>
    <p><strong>Role:</strong> Assorted | <strong>Cost:</strong> <span class=\"parc-stat\">Wealth 3</span></p>
    <p>Every faction offers a distinct, generated room and role, unique to that faction. <em>Requires high reputation with the associated faction.</em></p>
  </div>
  <div class=\"parc-module\">
    <h4>Magus's Choice</h4>
    <p><strong>Role:</strong> Magus's Choice</p>
    <p>Every game allows you to define a custom room and role of your choice; name the room and role and allow the game to generate content accordingly.</p>
  </div>
</div>

<div class=\"parc-section\">
  <h3>🎮 How to Play</h3>
  <ol>
    <li><strong>Configure settings:</strong> Define your Magus, the tower's spirit steward, custom starter room, and content preferences.</li>
    <li><strong>Choose residents:</strong> Use the Summoning Sanctum to complete your first summonings.</li>
    <li><strong>Build rooms:</strong> Construct rooms to house and employ your residents.</li>
    <li><strong>Assign roles:</strong> Give residents duties managing different rooms.</li>
    <li><strong>Establish connections:</strong> Work with factions to find employment and trade opportunities for your residents.</li>
    <li><strong>Navigate skits:</strong> Make freeform choices in interactive scenes that shape relationships and outcomes.</li>
  </ol>
</div>
<style>.parc-section{background:linear-gradient(135deg,rgba(102,126,234,0.12) 0%,rgba(118,75,162,0.08) 100%);border-left:4px solid rgba(102,126,234,0.6);padding:15px;margin:15px 0;border-radius:6px;backdrop-filter:blur(10px)}.parc-section h3{margin-top:0;color:#8b9cf5;font-size:1.3em;text-shadow:0 0 10px rgba(102,126,234,0.3)}.parc-module{background:linear-gradient(135deg,rgba(102,126,234,0.08) 0%,rgba(118,75,162,0.05) 100%);border:1px solid rgba(102,126,234,0.3);padding:12px;margin:10px 0;border-radius:6px;backdrop-filter:blur(5px)}.parc-module h4{color:#a78bfa;margin:0 0 8px 0;font-size:1.1em;text-shadow:0 0 8px rgba(118,75,162,0.3)}.parc-module p{margin:5px 0;opacity:0.9}.parc-stat{display:inline-block;background:linear-gradient(135deg,rgba(102,126,234,0.7) 0%,rgba(118,75,162,0.7) 100%);color:#fff;padding:3px 8px;border-radius:4px;font-size:0.85em;margin:2px;box-shadow:0 0 8px rgba(102,126,234,0.4)}.parc-feature-list{list-style:none;padding-left:0}.parc-feature-list li{padding:8px 0;padding-left:25px;position:relative;opacity:0.95}.parc-feature-list li:before{content:'✨';position:absolute;left:0;font-size:1.2em;filter:drop-shadow(0 0 3px rgba(102,126,234,0.6))}.parc-link{color:#8b9cf5;text-decoration:none;font-weight:bold;text-shadow:0 0 5px rgba(102,126,234,0.3)}.parc-link:hover{text-decoration:underline;color:#a78bfa}</style>
"

# The schema of any user-supplied config.
config_schema:
  type: object
  properties:
    beta_mode:
      title: Beta Mode
      description: Enable experimental beta features.
      type: string
      default: "False"
      enum: ["True", "False"]

# The schema of the state that you store.
state_schema:
  init:
    type: object
    properties:
      grid:
        type: string
  message:
    type: object
    properties:
      angry:
        type: boolean
        default: true
  chat:
    type: object
    properties:
      visited:
        type: array
        items:
          type: integer

