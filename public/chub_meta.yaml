creator_notes: "
<div class=\"sct-section\">
  <h3>📋 Game Overview</h3>
  <p>You are the Founder of a young frontier town on the edge of the Crossroads - a realm between realms, where the roads of countless worlds meet. In your town square stands the Wishing Well - to every eye an ordinary old stone well, though local lore credits it for what happens next. Anyone, in any world, who truly and sincerely longs for a new life may find their wish heard - and their application for residency delivered to your desk.</p>
  <p>No one arrives here who does not want to be here - new residents step through the Arrivals Hall's grand double doors at the exact moment they fully commit to a fresh start - and the road home is always open. Your task is simpler and warmer than saving the world: review applications, welcome newcomers, raise buildings, assign roles, and help a town full of people from every walk of every world build their second chance.</p>
  <p>Each playthrough is unique, with characters and neighboring communities procedurally loaded from Chub's extensive library, ensuring no two towns are alike.</p>
  <p><em>A cozy rework of Lord Raven's Post-Apocalypse Rehabilitation Center, by way of The Spire, made with his blessing.</em></p>
</div>

<div class=\"sct-section\">
  <h3>✨ Key Features</h3>
  <ul class=\"sct-feature-list\">
    <li><strong>Volunteers Only:</strong> Every resident chose this - some knowingly, some through a wish they barely dared to speak. Approve or decline applications, or cast a wish of your own for exactly the sort of person you hope applies.</li>
    <li><strong>Generative Content:</strong> Leverages Chub's generative endpoints to create character art, voice lines, and dynamic story content.</li>
    <li><strong>Dynamic Character System:</strong> Characters are loaded from Chub's library, creating unique residents and visiting envoys for every playthrough.</li>
    <li><strong>Worlds of Origin:</strong> Every resident carries a record of the world they came from - canon settings by name - keeping characters true to their roots in every scene.</li>
    <li><strong>Interactive Skits:</strong> Visual novel-style scenes where your choices shape relationships, town stats, and story progression.</li>
    <li><strong>Town Management:</strong> Raise practical or frivolous buildings, manage six interconnected town stats, and balance competing needs.</li>
    <li><strong>Good Neighbors:</strong> Build relationships with the communities and guilds of the Crossroads, trade resources, and find work placements for your residents.</li>
    <li><strong>Content Filters:</strong> Extensive content management tools let you tailor the experience to your preferences.</li>
    <li><strong>Save System:</strong> Full save/load functionality to preserve your progress or experiment with different choices.</li>
  </ul>
</div>

<div class=\"sct-section\">
  <h3>📊 Town Stats</h3>
  <p>Your town's wellbeing is measured across six interconnected statistics. Every decision you make affects these values:</p>
  <div style=\"margin-top: 10px;\">
    <span class=\"sct-stat\">⚙️ Infrastructure</span> - Roads, wards, and utilities that keep the town running<br>
    <span class=\"sct-stat\">🛏️ Comfort</span> - How pleasant it feels to call this place home<br>
    <span class=\"sct-stat\">🍽️ Provision</span> - Food, water, and the town stores<br>
    <span class=\"sct-stat\">🛡️ Security</span> - The watch, the wards, and peace of mind on the frontier<br>
    <span class=\"sct-stat\">💖 Harmony</span> - Neighborliness, morale, and community spirit<br>
    <span class=\"sct-stat\">💰 Wealth</span> - The town coffers<br>
  </div>
</div>

<div class=\"sct-section\">
  <h3>🏗️ Core Buildings</h3>
  <p>Build and expand your town with specialized buildings. Most serve a unique function and can be assigned a resident to manage them. Your charter includes six starter buildings: the Arrivals Hall, Meeting Hall, Public Works, Tavern, Town Hall, and Wishing Well.</p>

  <div class=\"sct-module\">
    <h4>Arrivals Hall</h4>
    <p><strong>Role:</strong> Greeter</p>
    <p>The heart of the town's welcome, centered on a set of grand double doors to Everywhere Else. Approved applicants step through at the exact moment they fully commit to a fresh start - and take their first bewildered, hopeful steps as residents.</p>
  </div>

  <div class=\"sct-module\">
    <h4>Meeting Hall</h4>
    <p><strong>Role:</strong> Herald</p>
    <p>Where the town receives the wider Crossroads: representatives from neighboring towns, guilds, and larger polities visit to arrange trade, work placements, and deals with the Founder.</p>
  </div>

  <div class=\"sct-module\">
    <h4>Public Works</h4>
    <p><strong>Role:</strong> Engineer</p>
    <p>Keeps the town running: power, water, roads, and the occasional stubborn mystery in the pipes. Tend the utilities and infrastructure that every other building depends on.</p>
  </div>

  <div class=\"sct-module\">
    <h4>Homes</h4>
    <p><strong>Role:</strong> Resident | <strong>Cost:</strong> <span class=\"sct-stat\">Provision 1</span></p>
    <p>Personal homes. Build multiple homes to house your growing population. Visit residents for intimate, personal interactions.</p>
  </div>

  <div class=\"sct-module\">
    <h4>Tavern</h4>
    <p><strong>Role:</strong> Host</p>
    <p>Warm hearth, good drink, and better company - where townsfolk and visitors gather to eat, drink, swap news, and build relationships. The social heart of your town.</p>
  </div>

  <div class=\"sct-module\">
    <h4>Apothecary</h4>
    <p><strong>Role:</strong> Healer | <strong>Cost:</strong> <span class=\"sct-stat\">Provision 1</span> <span class=\"sct-stat\">Comfort 1</span></p>
    <p>Healing hall for treating injuries and ailments. Essential for maintaining residents' health and well-being.</p>
  </div>

  <div class=\"sct-module\">
    <h4>Training Yard</h4>
    <p><strong>Role:</strong> Coach | <strong>Cost:</strong> <span class=\"sct-stat\">Comfort 1</span> <span class=\"sct-stat\">Wealth 1</span></p>
    <p>Open grounds for exercise and friendly contests. Keeps residents fit and spirits high.</p>
  </div>

  <div class=\"sct-module\">
    <h4>Town Hall</h4>
    <p><strong>Role:</strong> Clerk</p>
    <p>The Founder's office and the desks of the town staff - where permits, plans, records, and the occasional dispute get handled.</p>
  </div>

  <div class=\"sct-module\">
    <h4>Watch Post</h4>
    <p><strong>Role:</strong> Watch Captain | <strong>Cost:</strong> <span class=\"sct-stat\">Infrastructure 1</span> <span class=\"sct-stat\">Wealth 1</span></p>
    <p>The frontier is gentle to those who respect it, but wilderness is still wilderness. Manages the town's wards, watch rotations, and defenses. <em>Requires contact with at least 3 neighboring communities.</em></p>
  </div>

  <div class=\"sct-module\">
    <h4>Explorers' Guild</h4>
    <p><strong>Role:</strong> Guildmaster | <strong>Cost:</strong> <span class=\"sct-stat\">Harmony 2</span> <span class=\"sct-stat\">Infrastructure 2</span></p>
    <p>The frontier does not map itself. Charter expeditions into the unclaimed wilds beyond the town's wards; residents who sign on are away on expedition until they return - with stories, and perhaps more. <em>Requires at least 5 residents.</em></p>
  </div>

  <div class=\"sct-module\">
    <h4>Wishing Well</h4>
    <p><strong>Role:</strong> Wellkeeper</p>
    <p>An ordinary old stone well in a tidy plaza - or so it looks. Toss in a coin and a wish of your own, describing exactly the sort of person you hope will apply for residency. No one is ever brought here against their will.</p>
  </div>

  <div class=\"sct-module\">
    <h4>Community Halls</h4>
    <p><strong>Role:</strong> Assorted | <strong>Cost:</strong> <span class=\"sct-stat\">Wealth 3</span></p>
    <p>Every neighboring community offers a distinct, generated building and role, unique to that community. <em>Requires high reputation with the associated community.</em></p>
  </div>
  <div class=\"sct-module\">
    <h4>Founder's Choice</h4>
    <p><strong>Role:</strong> Founder's Choice</p>
    <p>Every game allows you to define a custom building and role of your choice; name the building and role and allow the game to generate content accordingly.</p>
  </div>
</div>

<div class=\"sct-section\">
  <h3>🎮 How to Play</h3>
  <ol>
    <li><strong>Configure settings:</strong> Define your Founder, your Aide, a custom starter building, and content preferences.</li>
    <li><strong>Welcome residents:</strong> Review applications at the Arrivals Hall - approve, decline, or wish for someone specific at the Wishing Well.</li>
    <li><strong>Raise buildings:</strong> Construct homes and community buildings to house and employ your residents.</li>
    <li><strong>Assign roles:</strong> Give residents duties managing different buildings.</li>
    <li><strong>Befriend the neighbors:</strong> Work with nearby communities to find trade and employment opportunities.</li>
    <li><strong>Navigate skits:</strong> Make freeform choices in interactive scenes that shape relationships and outcomes.</li>
  </ol>
</div>
